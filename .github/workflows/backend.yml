name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'HabitTracker/**'
      - 'HabitTracker.Tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'HabitTracker/**'
      - 'HabitTracker.Tests/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore HabitTracker.Tests/HabitTracker.Tests.csproj

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal
